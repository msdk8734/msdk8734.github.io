<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiroshi Sugimoto — Public Art &amp; Architecture Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --surface: #1c1c1c;
      --border: #2a2a2a;
      --border-mid: #383838;
      --text-primary: #f0ece4;
      --text-secondary: #9a9690;
      --text-muted: #6a6a64;
      --accent: #c8b89a;
      --accent-dim: rgba(200,184,154,0.15);

      --cat-architecture: #c8b89a;
      --cat-sculpture:    #9ab8c8;
      --cat-installation: #b89ac8;
      --cat-permanent:    #9ac8b0;

      --access-public:      #9ac8b0;
      --access-reservation: #c8b89a;
      --access-limited:     #c8a09a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'IBM Plex Sans', 'IBM Plex Sans JP', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    #header .logo {
      display: flex; align-items: baseline; gap: 12px;
    }
    #header .logo-jp {
      font-family: 'IBM Plex Sans JP', sans-serif;
      font-size: 13px; font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }
    #header .logo-en {
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      font-family: 'IBM Plex Sans', sans-serif;
    }
    #header .count-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    #header .count-badge span {
      color: var(--accent);
      font-weight: 400;
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    #app {
      position: fixed;
      top: 52px; bottom: 0; left: 0; right: 0;
      display: flex;
    }

    /* ── SIDEBAR ─────────────────────────────────────── */
    #sidebar {
      width: 320px; min-width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* filters */
    #filters {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .filter-label {
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .chip-group {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .chip {
      padding: 3px 10px;
      border: 1px solid var(--border-mid);
      border-radius: 2px;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
      background: transparent;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .chip:hover { border-color: var(--accent); color: var(--text-primary); }
    .chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip[data-cat="architecture"].active  { border-color: var(--cat-architecture); color: var(--cat-architecture); background: rgba(200,184,154,0.12); }
    .chip[data-cat="sculpture"].active     { border-color: var(--cat-sculpture);    color: var(--cat-sculpture);    background: rgba(154,184,200,0.12); }
    .chip[data-cat="installation"].active  { border-color: var(--cat-installation); color: var(--cat-installation); background: rgba(184,154,200,0.12); }
    .chip[data-access="public"].active     { border-color: var(--access-public);      color: var(--access-public);      background: rgba(154,200,176,0.12); }
    .chip[data-access="reservation"].active{ border-color: var(--access-reservation); color: var(--access-reservation); background: rgba(200,184,154,0.12); }
    .chip[data-access="limited"].active    { border-color: var(--access-limited);     color: var(--access-limited);     background: rgba(200,160,154,0.12); }

    /* work list */
    #work-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    #work-list::-webkit-scrollbar { width: 3px; }
    #work-list::-webkit-scrollbar-track { background: transparent; }
    #work-list::-webkit-scrollbar-thumb { background: var(--border-mid); }

    .work-item {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .work-item:hover { background: rgba(255,255,255,0.05); }
    .work-item.active { background: var(--accent-dim); }

    .work-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .work-info { flex: 1; min-width: 0; }
    .work-name-ja {
      font-family: 'IBM Plex Sans JP', sans-serif;
      font-size: 12px; font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .work-name-en {
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .work-meta {
      display: flex; gap: 6px; margin-top: 5px; align-items: center;
    }
    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 300;
      padding: 1px 5px;
      border-radius: 1px;
      letter-spacing: 0.04em;
    }
    .tag-year { color: var(--text-muted); background: transparent; }

    /* ── MAP ─────────────────────────────────────────── */
    #map {
      flex: 1;
      background: var(--bg);
    }

    /* Leaflet tile override for dark */
    .leaflet-tile { filter: brightness(0.32) grayscale(1) contrast(1.2); }
    .leaflet-container { background: var(--bg); }

    /* Custom marker */
    .custom-marker {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.8);
      transition: transform 0.15s;
      cursor: pointer;
    }
    .custom-marker:hover, .custom-marker.hover { transform: scale(1.5); }
    .custom-marker.pulse {
      animation: pulse 1.5s ease-out;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0px rgba(200,184,154,0.6), 0 0 0 1px rgba(255,255,255,0.2); }
      100% { box-shadow: 0 0 0 12px rgba(200,184,154,0), 0 0 0 1px rgba(255,255,255,0.1); }
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border-mid) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: 260px !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 16px !important;
      top: 8px !important; right: 8px !important;
      width: 20px !important; height: 20px !important;
      line-height: 20px !important;
    }
    .leaflet-popup-close-button:hover { color: var(--text-primary) !important; }

    .popup-inner { padding: 16px; }
    .popup-cat-bar {
      height: 2px; width: 28px;
      border-radius: 1px;
      margin-bottom: 10px;
    }
    .popup-name-ja {
      font-family: 'IBM Plex Sans JP', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      line-height: 1.4;
    }
    .popup-name-en {
      font-size: 11px; font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      margin-top: 3px;
      line-height: 1.4;
    }
    .popup-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }
    .popup-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 4px;
    }
    .popup-row-key {
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .popup-row-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      text-align: right;
    }
    .popup-desc {
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-top: 10px;
    }
    .popup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,184,154,0.3);
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }
    .popup-link:hover { border-color: var(--accent); }

    /* ── DETAIL PANEL ────────────────────────────────── */
    #detail {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      z-index: 800;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }

    /* ── LEGEND ──────────────────────────────────────── */
    #legend {
      position: absolute;
      top: 16px; right: 16px;
      z-index: 800;
      background: rgba(28,28,28,0.94);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
    }
    .legend-title {
      font-size: 8px; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-text {
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .legend-sep {
      height: 1px; background: var(--border);
      margin: 8px 0;
    }

    /* ── MOBILE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      #legend { display: none; }
    }

    /* no-results */
    #no-results {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      display: none;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">
    <span class="logo-jp">Hiroshi Sugimoto</span>
    <span class="logo-en">Public Art &amp; Architecture Map</span>
  </div>
  <div class="count-badge">
    <span id="visible-count">14</span> / 14 works
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="filters">
      <div>
        <div class="filter-label">Category</div>
        <div class="chip-group">
          <button class="chip active" data-filter="cat" data-value="all">All</button>
          <button class="chip" data-filter="cat" data-cat="architecture" data-value="architecture">Architecture</button>
          <button class="chip" data-filter="cat" data-cat="sculpture" data-value="sculpture">Sculpture</button>
          <button class="chip" data-filter="cat" data-cat="installation" data-value="installation">Installation</button>
        </div>
      </div>
      <div>
        <div class="filter-label">Access</div>
        <div class="chip-group">
          <button class="chip active" data-filter="access" data-value="all">All</button>
          <button class="chip" data-filter="access" data-access="public" data-value="public">Public</button>
          <button class="chip" data-filter="access" data-access="reservation" data-value="reservation">Reservation</button>
          <button class="chip" data-filter="access" data-access="limited" data-value="limited">Limited</button>
        </div>
      </div>
      <div>
        <div class="filter-label">Region</div>
        <div class="chip-group">
          <button class="chip active" data-filter="country" data-value="all">All</button>
          <button class="chip" data-filter="country" data-value="Japan">Japan</button>
          <button class="chip" data-filter="country" data-value="USA">USA</button>
          <button class="chip" data-filter="country" data-value="France">France</button>
          <button class="chip" data-filter="country" data-value="Italy">Italy</button>
        </div>
      </div>
    </div>

    <div id="work-list"></div>
    <div id="no-results">No works match the current filters.</div>
  </div>

  <div id="map">
    <div id="legend">
      <div class="legend-title">Category</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--cat-architecture)"></div><span class="legend-text">Architecture</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--cat-sculpture)"></div><span class="legend-text">Sculpture</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--cat-installation)"></div><span class="legend-text">Installation</span></div>
      <div class="legend-sep"></div>
      <div class="legend-title">Access</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--access-public); border-radius:2px;"></div><span class="legend-text">Public</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--access-reservation); border-radius:2px;"></div><span class="legend-text">Reservation required</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--access-limited); border-radius:2px;"></div><span class="legend-text">Limited access</span></div>
    </div>
  </div>
</div>

<script>
// ── DATA (fetched from data/sugimoto.json) ────────────
let works = [];

// ── COLORS ────────────────────────────────────────────
const CAT_COLOR = {
  architecture: '#c8b89a',
  sculpture:    '#9ab8c8',
  installation: '#b89ac8'
};
const ACCESS_LABEL = {
  public:      'Public',
  reservation: 'Reservation required',
  limited:     'Limited access'
};
const ACCESS_COLOR = {
  public:      '#9ac8b0',
  reservation: '#c8b89a',
  limited:     '#c8a09a'
};

// ── MAP INIT ──────────────────────────────────────────
const map = L.map('map', {
  center: [35.5, 138],
  zoom: 3,
  zoomControl: false,
  attributionControl: false,
  worldCopyJump: false,
  maxBounds: [[-80, -100], [85, 370]],
  maxBoundsViscosity: 0.6
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: '© OpenStreetMap contributors' }).addTo(map);

// ── STATE ─────────────────────────────────────────────
let filters = { cat: 'all', access: 'all', country: 'all' };
let activeId = null;
const markers = {};

// ── MARKER ICON ───────────────────────────────────────
function makeIcon(work, size = 12) {
  const color = CAT_COLOR[work.category] || '#888';
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker" style="background:${color};width:${size}px;height:${size}px;"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2 - 4]
  });
}

// ── POPUP CONTENT ─────────────────────────────────────
function popupHTML(w) {
  const catColor = CAT_COLOR[w.category] || '#888';
  const accessColor = ACCESS_COLOR[w.access] || '#888';
  return `<div class="popup-inner">
    <div class="popup-cat-bar" style="background:${catColor}"></div>
    <div class="popup-name-ja">${w.name}</div>
    ${w.nameJa ? `<div class="popup-name-en">${w.nameJa}</div>` : ''}
    <div class="popup-divider"></div>
    <div class="popup-row">
      <span class="popup-row-key">Year</span>
      <span class="popup-row-val">${w.year}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Category</span>
      <span class="popup-row-val" style="color:${catColor}">${w.category}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Access</span>
      <span class="popup-row-val" style="color:${accessColor}">${ACCESS_LABEL[w.access]}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Location</span>
      <span class="popup-row-val" style="max-width:150px;white-space:normal;font-size:9px">${w.location}</span>
    </div>
    <div class="popup-desc">${w.description}</div>
    ${w.url ? `<a class="popup-link" href="${w.url}" target="_blank" rel="noopener">詳細 →</a>` : ''}
  </div>`;
}

// ── SELECT WORK ───────────────────────────────────────
function selectWork(id) {
  activeId = id;
  // sidebar highlight
  document.querySelectorAll('.work-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  // marker pulse
  const w = works.find(x => x.id === id);
  if (!w) return;
  const marker = markers[id];
  const el = marker.getElement();
  if (el) {
    const dot = el.querySelector('.custom-marker');
    dot?.classList.remove('pulse');
    void dot?.offsetWidth;
    dot?.classList.add('pulse');
    setTimeout(() => dot?.classList.remove('pulse'), 1600);
  }
  // open popup
  marker.openPopup();
  // scroll list
  const listItem = document.querySelector(`.work-item[data-id="${id}"]`);
  listItem?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── BUILD LIST ────────────────────────────────────────
function buildList(filteredWorks) {
  const list = document.getElementById('work-list');
  const noRes = document.getElementById('no-results');
  const countEl = document.getElementById('visible-count');

  list.innerHTML = '';
  countEl.textContent = filteredWorks.length;

  if (filteredWorks.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  filteredWorks.forEach(w => {
    const color = CAT_COLOR[w.category] || '#888';
    const div = document.createElement('div');
    div.className = 'work-item' + (w.id === activeId ? ' active' : '');
    div.dataset.id = w.id;
    div.innerHTML = `
      <div class="work-dot" style="background:${color}"></div>
      <div class="work-info">
        <div class="work-name-ja">${w.name}</div>
        ${w.nameJa ? `<div class="work-name-en">${w.nameJa}</div>` : ''}
        <div class="work-meta">
          <span class="tag tag-year">${w.year}</span>
          <span class="tag" style="color:${color};background:${color}18">${w.category}</span>
        </div>
      </div>`;
    div.addEventListener('click', () => {
      map.setView([w.lat, w.lng], Math.max(map.getZoom(), 8), { animate: true });
      selectWork(w.id);
    });
    list.appendChild(div);
  });
}

// ── FILTER ────────────────────────────────────────────
function applyFilters() {
  const filtered = works.filter(w => {
    if (filters.cat !== 'all' && w.category !== filters.cat) return false;
    if (filters.access !== 'all' && w.access !== filters.access) return false;
    if (filters.country !== 'all' && w.country !== filters.country) return false;
    return true;
  });

  works.forEach(w => {
    const vis = filtered.includes(w);
    if (vis) { if (!map.hasLayer(markers[w.id])) markers[w.id].addTo(map); }
    else       { if (map.hasLayer(markers[w.id])) map.removeLayer(markers[w.id]); }

  });

  buildList(filtered);
}

// ── CHIPS ─────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const filterType = chip.dataset.filter;
    const value = chip.dataset.value;

    // deactivate siblings
    document.querySelectorAll(`.chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    filters[filterType] = value;
    applyFilters();
  });
});

// ── INIT (fetch data/sugimoto.json) ───────────────────
fetch('data/sugimoto.json')
  .then(r => r.json())
  .then(data => {
    works = data;
    works.forEach(w => {
      // USA works: place at lng+360 so they appear east of Japan on the map.
      // All other works: place at original coordinates.
      const placeLng = (w.country === 'USA') ? w.lng + 360 : w.lng;
      const marker = L.marker([w.lat, placeLng], { icon: makeIcon(w) });
      marker.bindPopup(popupHTML(w), {
        maxWidth: 280, minWidth: 260,
        className: 'sugimoto-popup',
        closeButton: true
      });
      marker.on('click', () => selectWork(w.id));
      marker.on('mouseover', () => {
        const el = marker.getElement();
        if (el) el.querySelector('.custom-marker')?.classList.add('hover');
      });
      marker.on('mouseout', () => {
        const el = marker.getElement();
        if (el) el.querySelector('.custom-marker')?.classList.remove('hover');
      });
      marker.addTo(map);
      markers[w.id] = marker;
    });
    document.querySelector('.count-badge').innerHTML =
      `<span id="visible-count">${works.length}</span> / ${works.length} works`;
    applyFilters();
  })
  .catch(err => {
    console.error('Failed to load sugimoto.json:', err);
    document.getElementById('no-results').textContent = 'Failed to load sugimoto.json.';
    document.getElementById('no-results').style.display = 'block';
  });
