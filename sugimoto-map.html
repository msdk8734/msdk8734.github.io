<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiroshi Sugimoto — Public Art &amp; Architecture Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=IBM+Plex+Sans+JP:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #808081;
      --surface: #737374;
      --border: #686869;
      --border-mid: #757576;
      --text-primary: #eeeeec;
      --text-secondary: #d0d2d0;
      --text-muted: #b0b4b2;
      --accent: #7a9aa8;
      --accent-dim: rgba(122,154,168,0.2);

      --cat-architecture: #e8d8b8;
      --cat-sculpture:    #a8c8d8;
      --cat-installation: #c8a8d8;
      --cat-permanent:    #a8d8c0;

      --access-public:      #a8d8c0;
      --access-reservation: #e8d8b8;
      --access-limited:     #d8a8a8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'IBM Plex Sans', 'IBM Plex Sans JP', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    #header .logo {
      display: flex; align-items: baseline; gap: 12px;
    }
    #header .logo-jp {
      font-family: 'Cormorant Garamond', 'IBM Plex Sans JP', serif;
      font-size: 17px; font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--text-primary);
      text-transform: uppercase;
    }
    #header .logo-en {
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text-secondary);
      font-family: 'IBM Plex Sans', sans-serif;
      text-transform: uppercase;
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    #app {
      position: fixed;
      top: 52px; bottom: 0; left: 0; right: 0;
      display: flex;
    }

    /* ── SIDEBAR ─────────────────────────────────────── */
    #sidebar {
      width: 320px; min-width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* filters */

    /* work list */
    #work-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    #work-list::-webkit-scrollbar { width: 3px; }
    #work-list::-webkit-scrollbar-track { background: transparent; }
    #work-list::-webkit-scrollbar-thumb { background: var(--border-mid); }

    .work-item {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .work-item:hover { background: rgba(255,255,255,0.08); }
    .work-item.active { background: rgba(122,154,168,0.2); }

    .work-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .work-info { flex: 1; min-width: 0; }
    .work-name-ja {
      font-family: 'IBM Plex Sans JP', sans-serif;
      font-size: 12px; font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .work-name-en {
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .work-meta {
      display: flex; gap: 6px; margin-top: 5px; align-items: center;
    }
    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 300;
      padding: 1px 5px;
      border-radius: 1px;
      letter-spacing: 0.04em;
    }
    .tag-year { color: var(--text-muted); background: transparent; }

    /* ── MAP ─────────────────────────────────────────── */
    #map {
      flex: 1;
      background: var(--bg);
    }

    /* Leaflet tile override for dark */
  
    .leaflet-tile { filter: brightness(0.62) grayscale(0.8) contrast(1.0) saturate(0.6); }
  .leaflet-container { background: #808081; }

    /* ── INFO PANEL (fixed top-right) ──────────────────── */
    #info-panel {
      position: absolute;
      top: 68px; right: 16px;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      z-index: 900;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      display: none;
      max-height: calc(100% - 88px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    #info-panel.visible { display: block; }
    #info-panel-close {
      position: absolute;
      top: 8px; right: 10px;
      background: none; border: none;
      color: var(--text-muted);
      font-size: 16px; line-height: 1;
      cursor: pointer; padding: 0;
    }
    #info-panel-close:hover { color: var(--text-primary); }

    /* Custom marker */
    .custom-marker {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.8);
      transition: transform 0.15s;
      cursor: pointer;
    }
    .custom-marker:hover, .custom-marker.hover { transform: scale(1.5); }
    .custom-marker.pulse {
      animation: pulse 1.5s ease-out;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0px rgba(200,184,154,0.6), 0 0 0 1px rgba(255,255,255,0.2); }
      100% { box-shadow: 0 0 0 12px rgba(200,184,154,0), 0 0 0 1px rgba(255,255,255,0.1); }
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border-mid) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: 260px !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 16px !important;
      top: 8px !important; right: 8px !important;
      width: 20px !important; height: 20px !important;
      line-height: 20px !important;
    }
    .leaflet-popup-close-button:hover { color: var(--text-primary) !important; }

    .popup-inner { padding: 16px; }
    .popup-cat-bar {
      height: 2px; width: 28px;
      border-radius: 1px;
      margin-bottom: 10px;
    }
    .popup-name-ja {
      font-family: 'IBM Plex Sans JP', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      line-height: 1.4;
    }
    .popup-name-en {
      font-size: 11px; font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      margin-top: 3px;
      line-height: 1.4;
    }
    .popup-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }
    .popup-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 4px;
    }
    .popup-row-key {
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .popup-row-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      text-align: right;
    }
    .popup-desc {
      font-size: 10px; font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-top: 10px;
    }
    .popup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,184,154,0.3);
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }
    .popup-link:hover { border-color: var(--accent); }

    /* ── DETAIL PANEL ────────────────────────────────── */
    #detail {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      z-index: 800;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }



    /* ── MOBILE ──────────────────────────────────────── */
    /* Reset button (visible on all screens) */
    #reset-btn {
      position: absolute;
      bottom: 32px; left: 16px;
      z-index: 900;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      color: var(--text-secondary);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #reset-btn:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 640px) {
      #sidebar { display: none; }
      .count-badge { display: none; }

      /* Bottom sheet */
      #bottom-sheet {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        z-index: 1100;
        background: var(--surface);
        border-top: 1px solid var(--border-mid);
        border-radius: 14px 14px 0 0;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
        display: flex; flex-direction: column;
        /* height and list max-height set by JS */
        transition: height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      }
      #bottom-sheet-handle {
        flex-shrink: 0;
        height: 48px;
        display: flex; align-items: center; justify-content: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
      }
      #bottom-sheet-handle .handle-bar {
        width: 36px; height: 4px;
        background: var(--border-mid);
        border-radius: 2px;
      }
      #bottom-sheet-handle .handle-label {
        font-size: 11px; font-weight: 400;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--text-muted);
      }
      #bottom-sheet-list {
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border-mid) transparent;
        /* max-height set dynamically by JS */
      }
      /* info panel: smaller on mobile */
      #info-panel {
        width: calc(100% - 32px);
        top: 60px; right: 16px; left: 16px;
      }
      /* reset btn: above bottom sheet handle */
      #reset-btn {
        bottom: 56px;
      }
      /* Push leaflet zoom control up so minus button clears bottom sheet */
      .leaflet-bottom.leaflet-right {
        bottom: 56px !important;
      }
    }

    /* no-results */
    #no-results {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      display: none;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">
    <span class="logo-jp">Hiroshi Sugimoto</span>
    <span class="logo-en">Public Art &amp; Architecture Map</span>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="work-list"></div>
    <div id="no-results">No works match the current filters.</div>
  </div>

  <div id="map">
    <button id="reset-btn">⌂ Reset view</button>
    <div id="info-panel"><button id="info-panel-close">✕</button><div id="info-panel-content"></div></div>
    </div>
  </div>
</div>

<!-- Mobile bottom sheet -->
<div id="bottom-sheet">
  <div id="bottom-sheet-handle">
    <div class="handle-bar"></div>
    <span class="handle-label">Works</span>
    <div class="handle-bar"></div>
  </div>
  <div id="bottom-sheet-list"></div>
</div>

<script>
// ── DATA (fetched from data/sugimoto.json) ────────────
let works = [];

// ── COLORS ────────────────────────────────────────────
const CAT_COLOR = {
  architecture:        '#c8b89a',
  sculpture:           '#9ab8c8',
  installation:        '#b89ac8',
  'permanent-collection': '#9ac8b0'
};
const ACCESS_LABEL = {
  public:      'Public',
  reservation: 'Reservation required',
  limited:     'Limited access'
};
const ACCESS_COLOR = {
  public:      '#9ac8b0',
  reservation: '#c8b89a',
  limited:     '#c8a09a'
};

// ── MAP INIT ──────────────────────────────────────────
const map = L.map('map', {
  center: [35.5, 138],
  zoom: 3,
  zoomControl: false,
  attributionControl: false,
  worldCopyJump: false,
  maxBounds: [[-80, -100], [85, 370]],
  maxBoundsViscosity: 0.6
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: '© OpenStreetMap contributors' }).addTo(map);

// ── STATE ─────────────────────────────────────────────
let activeId = null;
const markers = {};

// ── MARKER ICON ───────────────────────────────────────
function makeIcon(work, size = 12) {
  const color = CAT_COLOR[work.category] || '#888';
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker" style="background:${color};width:${size}px;height:${size}px;"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2 - 4]
  });
}

// ── POPUP CONTENT ─────────────────────────────────────
function popupHTML(w) {
  const catColor = CAT_COLOR[w.category] || '#888';
  const accessColor = ACCESS_COLOR[w.access] || '#888';
  return `<div class="popup-inner">
    <div class="popup-cat-bar" style="background:${catColor}"></div>
    <div class="popup-name-ja">${w.name}</div>
    ${w.nameJa ? `<div class="popup-name-en">${w.nameJa}</div>` : ''}
    <div class="popup-divider"></div>
    <div class="popup-row">
      <span class="popup-row-key">Year</span>
      <span class="popup-row-val">${w.year}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Category</span>
      <span class="popup-row-val" style="color:${catColor}">${w.category}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Access</span>
      <span class="popup-row-val" style="color:${accessColor}">${ACCESS_LABEL[w.access]}</span>
    </div>
    <div class="popup-row">
      <span class="popup-row-key">Location</span>
      <span class="popup-row-val" style="max-width:150px;white-space:normal;font-size:9px">${w.location}</span>
    </div>
    <div class="popup-desc">${w.description}</div>
    ${w.url ? `<a class="popup-link" href="${w.url}" target="_blank" rel="noopener">Learn more →</a>` : ''}
  </div>`;
}

// ── SELECT WORK ───────────────────────────────────────
function showInfoPanel(w) {
  const catColor = CAT_COLOR[w.category] || '#888';
  const accessColor = ACCESS_COLOR[w.access] || '#888';
  document.getElementById('info-panel-content').innerHTML = `
    <div class="popup-inner">
      <div class="popup-cat-bar" style="background:${catColor}"></div>
      <div class="popup-name-ja">${w.name}</div>
      ${w.nameJa ? `<div class="popup-name-en">${w.nameJa}</div>` : ''}
      <div class="popup-divider"></div>
      <div class="popup-row"><span class="popup-row-key">Year</span><span class="popup-row-val">${w.year}</span></div>
      <div class="popup-row"><span class="popup-row-key">Category</span><span class="popup-row-val" style="color:${catColor}">${w.category}</span></div>
      <div class="popup-row"><span class="popup-row-key">Access</span><span class="popup-row-val" style="color:${accessColor}">${ACCESS_LABEL[w.access]}</span></div>
      <div class="popup-row"><span class="popup-row-key">Location</span><span class="popup-row-val" style="max-width:140px;white-space:normal;font-size:9px">${w.location}</span></div>
      <div class="popup-desc">${w.description}</div>
      ${w.url ? `<a class="popup-link" href="${w.url}" target="_blank" rel="noopener">Learn more →</a>` : ''}
    </div>`;
  const panel = document.getElementById('info-panel');
  panel.classList.add('visible');
  panel.scrollTop = 0;
}

function selectWork(id) {
  activeId = id;
  // sidebar highlight
  document.querySelectorAll('.work-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  // marker pulse
  const w = works.find(x => x.id === id);
  if (!w) return;
  const marker = markers[id];
  const el = marker.getElement();
  if (el) {
    const dot = el.querySelector('.custom-marker');
    dot?.classList.remove('pulse');
    void dot?.offsetWidth;
    dot?.classList.add('pulse');
    setTimeout(() => dot?.classList.remove('pulse'), 1600);
  }

  // show info panel
  const w2 = works.find(x => x.id === id);
  if (w2) showInfoPanel(w2);
  // scroll list
  const listItem = document.querySelector(`.work-item[data-id="${id}"]`);
  listItem?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── BUILD LIST ────────────────────────────────────────
function buildList(filteredWorks) {
  const countryOrder = { 'Japan': 0, 'USA': 1, 'France': 2, 'Italy': 3 };
  filteredWorks = [...filteredWorks].sort((a, b) => {
    const ca = countryOrder[a.country] ?? 99;
    const cb = countryOrder[b.country] ?? 99;
    if (ca !== cb) return ca - cb;
    return a.year - b.year;
  });
  const list = document.getElementById('work-list');
  const noRes = document.getElementById('no-results');
  list.innerHTML = '';
  if (filteredWorks.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  filteredWorks.forEach(w => {
    const color = CAT_COLOR[w.category] || '#888';
    const div = document.createElement('div');
    div.className = 'work-item' + (w.id === activeId ? ' active' : '');
    div.dataset.id = w.id;
    div.innerHTML = `
      <div class="work-dot" style="background:${color}"></div>
      <div class="work-info">
        <div class="work-name-ja">${w.name}</div>
        ${w.nameJa ? `<div class="work-name-en">${w.nameJa}</div>` : ''}
        <div class="work-meta">
          <span class="tag tag-year">${w.year}</span>
          <span class="tag" style="color:${color};background:${color}18">${w.category}</span>
        </div>
      </div>`;
    div.addEventListener('click', () => {
      const mapLng = (w.country === 'USA') ? w.lng + 360 : w.lng;
      map.flyTo([w.lat, mapLng], 17, { animate: true, duration: 1.4 });
      map.once('moveend', () => { selectWork(w.id); });
    });
    list.appendChild(div);
  });
}

// ── FILTER ────────────────────────────────────────────
function applyFilters() {
  buildList(works);
  buildBottomSheetList(works);
}



// ── BOTTOM SHEET INIT ────────────────────────────────
// Run after DOM ready so window.innerHeight is correct
setTimeout(() => { setSheetStage('peek'); }, 0);

// ── INFO PANEL CLOSE ─────────────────────────────────
document.getElementById('info-panel-close').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('visible');
  activeId = null;
  document.querySelectorAll('.work-item').forEach(el => el.classList.remove('active'));
});

// ── RESET BUTTON ──────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  map.flyTo([35.5, 138], 3, { animate: true, duration: 1.2 });
  document.getElementById('info-panel').classList.remove('visible');
  activeId = null;
  document.querySelectorAll('.work-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#bottom-sheet-list .work-item').forEach(el => el.classList.remove('active'));
  if (typeof setSheetStage === 'function') setSheetStage('peek');
});

// ── BOTTOM SHEET ──────────────────────────────────────
const bottomSheet = document.getElementById('bottom-sheet');
const bottomHandle = document.getElementById('bottom-sheet-handle');

// 2-stage: peek → half → full (tap or swipe)
const HANDLE_H = 48;
function sheetStage() {
  if (bottomSheet.classList.contains('open')) return 'open';
  if (bottomSheet.classList.contains('half')) return 'half';
  return 'peek';
}
function setSheetStage(stage) {
  const winH = window.innerHeight;
  const halfH = Math.round(winH * 0.4);
  const fullH = Math.round(winH * 0.8);
  const list  = document.getElementById('bottom-sheet-list');

  bottomSheet.classList.remove('half', 'open');
  if (stage === 'peek') {
    bottomSheet.style.height = HANDLE_H + 'px';
    if (list) list.style.maxHeight = '0px';
  } else if (stage === 'half') {
    bottomSheet.classList.add('half');
    bottomSheet.style.height = halfH + 'px';
    if (list) list.style.maxHeight = (halfH - HANDLE_H) + 'px';
  } else {
    bottomSheet.classList.add('open');
    bottomSheet.style.height = fullH + 'px';
    if (list) list.style.maxHeight = (fullH - HANDLE_H) + 'px';
  }
}
// Init on load and on resize
window.addEventListener('resize', () => { setSheetStage(sheetStage()); });
bottomHandle.addEventListener('click', () => {
  const s = sheetStage();
  if (s === 'peek') setSheetStage('half');
  else if (s === 'half') setSheetStage('open');
  else setSheetStage('peek');
});

let touchStartY = 0;
let touchStartX = 0;
let touchStartScrollTop = 0;
let touchOnHandle = false;

bottomSheet.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  // Check if touch started on the handle area
  touchOnHandle = !!e.target.closest('#bottom-sheet-handle');
  // Record scroll position of the list at touch start
  const list = document.getElementById('bottom-sheet-list');
  touchStartScrollTop = list ? list.scrollTop : 0;
}, { passive: true });

bottomSheet.addEventListener('touchend', e => {
  // Only allow stage change if touch started on the handle
  if (!touchOnHandle) return;

  const dy = touchStartY - e.changedTouches[0].clientY;
  const s = sheetStage();
  if (dy > 40) {
    if (s === 'peek') setSheetStage('half');
    else if (s === 'half') setSheetStage('open');
  } else if (dy < -40) {
    if (s === 'open') setSheetStage('half');
    else if (s === 'half') setSheetStage('peek');
  }
}, { passive: true });

function buildBottomSheetList(filteredWorks) {
  const list = document.getElementById('bottom-sheet-list');
  if (!list) return;
  const countryOrder = { 'Japan': 0, 'USA': 1, 'France': 2, 'Italy': 3 };
  const sorted = [...filteredWorks].sort((a, b) => {
    const ca = countryOrder[a.country] ?? 99;
    const cb = countryOrder[b.country] ?? 99;
    return ca !== cb ? ca - cb : a.year - b.year;
  });
  list.innerHTML = '';
  sorted.forEach(w => {
    const color = CAT_COLOR[w.category] || '#888';
    const div = document.createElement('div');
    div.className = 'work-item' + (w.id === activeId ? ' active' : '');
    div.dataset.id = w.id;
    div.innerHTML = `
      <div class="work-dot" style="background:${color}"></div>
      <div class="work-info">
        <div class="work-name-ja">${w.name}</div>
        ${w.nameJa ? `<div class="work-name-en">${w.nameJa}</div>` : ''}
        <div class="work-meta">
          <span class="tag tag-year">${w.year}</span>
          <span class="tag" style="color:${color};background:${color}18">${w.category}</span>
        </div>
      </div>`;
    div.addEventListener('click', () => {
      const mapLng = (w.country === 'USA') ? w.lng + 360 : w.lng;
      map.flyTo([w.lat, mapLng], 17, { animate: true, duration: 1.4 });
      map.once('moveend', () => { selectWork(w.id); });
      // Collapse sheet after tap
      setSheetStage('peek');
    });
    list.appendChild(div);
  });
}

// ── INIT (fetch data/sugimoto.json) ───────────────────
fetch('data/sugimoto.json')
  .then(r => r.json())
  .then(data => {
    works = data;
    works.forEach(w => {
      // USA works: place at lng+360 so they appear east of Japan on the map.
      // All other works: place at original coordinates.
      const placeLng = (w.country === 'USA') ? w.lng + 360 : w.lng;
      const marker = L.marker([w.lat, placeLng], { icon: makeIcon(w) });
      marker.on('click', () => {
        const mapLng = (w.country === 'USA') ? w.lng + 360 : w.lng;
        map.flyTo([w.lat, mapLng], 17, { animate: true, duration: 1.4 });
        map.once('moveend', () => { selectWork(w.id); });
      });
      marker.on('mouseover', () => {
        const el = marker.getElement();
        if (el) el.querySelector('.custom-marker')?.classList.add('hover');
      });
      marker.on('mouseout', () => {
        const el = marker.getElement();
        if (el) el.querySelector('.custom-marker')?.classList.remove('hover');
      });
      marker.addTo(map);
      markers[w.id] = marker;
    });
    applyFilters();
  })
  .catch(err => {
    console.error('Failed to load sugimoto.json:', err);
    document.getElementById('no-results').textContent = 'Failed to load sugimoto.json.';
    document.getElementById('no-results').style.display = 'block';
  });
</script>
