<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Ramen Spending Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>🍜</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    color: #2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 250px;
    z-index: 100;
    padding: 14px 24px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.95) 70%, rgba(255,255,255,0) 100%);
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }
  .title-block h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
  .title-block h1 .accent { color: #d03025; }
  .title-block .sub { font-size: 10.5px; color: #888; margin-top: 2px; max-width: 520px; line-height: 1.4; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 2px; }

  /* ── View toggle buttons ── */
  .view-toggle {
    display: flex; gap: 4px; background: #f3f3f3; border-radius: 8px; padding: 3px;
  }
  .view-btn {
    padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; transition: all 0.18s;
    color: #888; background: transparent;
  }
  .view-btn.active { background: #fff; color: #d03025; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
  .view-btn:hover:not(.active) { color: #555; }

  .scale-legend { display: flex; align-items: flex-end; gap: 2px; }
  .scale-legend .bar-sample { width: 5px; background: #d03025; border-radius: 1.5px 1.5px 0 0; opacity: 0.85; }
  .scale-label { font-size: 10px; color: #999; margin-left: 6px; align-self: center; }

  /* ── Map ── */
  #map { width: 100vw; height: 100vh; display: block; }

  /* ── Prefecture paths ── */
  .pref-path {
    fill: #f2f2f2; stroke: #ffffff; stroke-width: 0.7;
    transition: fill 0.2s, stroke 0.15s, stroke-width 0.15s;
  }
  .pref-path:hover { stroke: #aaa; stroke-width: 1.2; }

  /* ── Bar chart ── */
  .bar-group { cursor: pointer; }
  .bar-group:hover .main-bar {
    fill: #ff2a1f !important;
    filter: drop-shadow(0 0 8px rgba(208,48,37,0.7)) brightness(1.15);
    stroke: #fffde0 !important; stroke-width: 2.5 !important;
  }
  .bar-group:hover .bar-cap { fill: #ffe566 !important; }
  body.highlighting .bar-group .main-bar { opacity: 0.22 !important; filter: saturate(0.4); transition: opacity 0.12s, filter 0.12s; }
  body.highlighting .bar-group .bar-cap,
  body.highlighting .bar-group circle { opacity: 0.15 !important; transition: opacity 0.12s; }
  .bar-group.linked .main-bar,
  body.highlighting .bar-group.linked .main-bar {
    fill: #0b57d0 !important; opacity: 1 !important;
    stroke: #fff7a8 !important; stroke-width: 2.5 !important;
    filter: drop-shadow(0 0 12px rgba(11,87,208,0.7)) brightness(1.1);
  }
  .bar-group.linked .bar-cap,
  body.highlighting .bar-group.linked .bar-cap { fill: #fff36d !important; opacity: 1 !important; }

  /* ── Bubble chart ── */
  .bubble-group { cursor: pointer; }
  .bubble-circle {
    transition: r 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s, fill 0.2s;
    opacity: 0.78;
  }
  .bubble-group:hover .bubble-circle { opacity: 1; filter: brightness(0.88); }
  body.highlighting .bubble-group .bubble-circle { opacity: 0.18 !important; filter: saturate(0.4); transition: opacity 0.12s; }
  .bubble-group.linked .bubble-circle,
  body.highlighting .bubble-group.linked .bubble-circle {
    fill: #0b57d0 !important; opacity: 1 !important;
    filter: drop-shadow(0 0 10px rgba(11,87,208,0.55));
  }


  /* ── Tooltip ── */
  .tooltip {
    position: fixed; pointer-events: none; background: rgba(255,255,255,0.97);
    backdrop-filter: blur(16px); border: 1px solid #e0e0e0; border-radius: 12px;
    padding: 16px 20px; opacity: 0; transition: opacity 0.12s; z-index: 200;
    min-width: 250px; box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1px 3px rgba(0,0,0,0.06);
  }
  .tooltip.visible { opacity: 1; }
  .tt-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 1px; }
  .tt-name-ja { font-size: 12px; color: #999; margin-bottom: 6px; }
  .tt-rank { font-size: 12px; font-weight: 600; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
  .tt-rank .num { color: #d03025; font-size: 20px; font-family: ui-monospace, monospace; }
  .tt-rank .of { color: #999; }
  .tt-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 10px; }
  .tt-label { font-size: 12px; color: #888; }
  .tt-val { font-family: ui-monospace, monospace; font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .tt-val .unit { font-size: 11px; color: #999; font-weight: 400; margin-left: 2px; }
  .tt-bar-bg { height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .tt-bar-fill { height: 100%; background: linear-gradient(90deg, #d03025, #f05a4f); border-radius: 3px; }
  .tt-note { font-size: 9.5px; color: #bbb; margin-top: 10px; line-height: 1.4; }

  /* ── Ranking sidebar ── */
  #ranking {
    position: fixed; right: 0; top: 0; bottom: 0; width: 250px;
    background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
    border-left: 1px solid #eee; z-index: 90;
    padding: 16px 10px 12px; overflow-y: auto;
  }
  .rk-title { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .rk-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 5px; cursor: pointer; transition: background 0.12s; }
  .rk-item:hover { background: rgba(26,111,196,0.06); }
  body.highlighting .rk-item { opacity: 0.42; transition: opacity 0.12s, background 0.12s, transform 0.12s; }
  .rk-item.linked, body.highlighting .rk-item.linked {
    opacity: 1 !important; background: rgba(11,87,208,0.14);
    outline: 2px solid rgba(11,87,208,0.28); transform: translateX(-2px);
  }
  .rk-item.linked .rk-name, .rk-item.linked .rk-val,
  body.highlighting .rk-item.linked .rk-name, body.highlighting .rk-item.linked .rk-val { color: #0b57d0; font-weight: 700; }
  .rk-item.linked .rk-bar-fill, body.highlighting .rk-item.linked .rk-bar-fill { background: #0b57d0; opacity: 1; }
  .rk-num { font-family: ui-monospace, monospace; font-size: 10px; font-weight: 600; color: #ccc; width: 18px; text-align: right; flex-shrink: 0; }
  .rk-num.gold { color: #d4a017; } .rk-num.silver { color: #999; } .rk-num.bronze { color: #b07040; }
  .rk-name { font-size: 11.5px; color: #444; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rk-val { font-family: ui-monospace, monospace; font-size: 10px; color: #999; flex-shrink: 0; }
  .rk-bar { width: 36px; height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .rk-bar-fill { height: 100%; border-radius: 2px; background: #1a6fc4; opacity: 0.5; }

  .hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-60%); font-size: 10px; color: #ccc; z-index: 100; }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0; background: #fff; display: flex;
    align-items: center; justify-content: center; z-index: 999;
    font-size: 14px; color: #999; flex-direction: column; gap: 12px;
  }
  .loading-spinner {
    width: 32px; height: 32px; border: 3px solid #eee;
    border-top-color: #d03025; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 720px) {
    #ranking { display: none; }
    #header { right: 0; padding: 12px 14px 8px; }
    .title-block h1 { font-size: 18px; }
    .title-block .sub { display: none; }
    .tooltip { min-width: 0; max-width: calc(100vw - 24px); padding: 12px 14px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-spinner"></div>
  <div>データを読み込んでいます…</div>
</div>

<div id="header">
  <div class="title-block">
    <h1>🍜 Japan <span class="accent">Ramen</span> Spending Map</h1>
    <div class="sub">prefectural capitals &amp; ordinance-designated cities · Source: MIC Family Income &amp; Expenditure Survey (2023–2025 avg)</div>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-bar" onclick="setView('bar')">📊 Bar</button>
      <button class="view-btn" id="btn-bubble" onclick="setView('bubble')">🫧 Bubble</button>
    </div>
    <div class="scale-legend" id="scale-legend"></div>
    <div class="scale-label" id="scale-label">Bar height = annual spending (JPY)</div>
  </div>
</div>

<svg id="map" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid meet"></svg>

<div id="ranking">
  <div class="rk-title">Ranking</div>
  <div id="rk-list"></div>
</div>

<div id="tooltip" class="tooltip"></div>
<div class="hint">Drag to pan · Pinch / scroll to zoom</div>

<script>
// ── Config ──────────────────────────────────────────────────
const GEOJSON_URL   = 'geo-json/japan.geojson';
const CSV_URL       = 'data/ramen-data.csv';
const nationalAvg   = 8752;
const jpyToUsd      = 0.0067;
const isMobile      = window.matchMedia('(max-width:720px)').matches || ('ontouchstart' in window);

const designWidth   = 1200;
const designHeight  = 900;
const usableWidth   = isMobile ? designWidth : designWidth - 250;

// ── Projection ───────────────────────────────────────────────
function project(lon, lat) {
  const scale = 1900, centerLon = 136.0, centerLat = 36.0;
  const tx = usableWidth / 2, ty = designHeight / 2 + 40;
  const lambda = lon * Math.PI / 180;
  const phi    = Math.max(-89.5, Math.min(89.5, lat)) * Math.PI / 180;
  const lambda0 = centerLon * Math.PI / 180;
  const x = scale * (lambda - lambda0) + tx;
  const y = scale * Math.log(Math.tan(Math.PI/4 + (centerLat*Math.PI/180)/2))
          - scale * Math.log(Math.tan(Math.PI/4 + phi/2)) + ty;
  return [x, y];
}

// ── SVG helpers ──────────────────────────────────────────────
const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('map');

function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ── Layers ───────────────────────────────────────────────────
const prefLayer   = el('g'); svg.appendChild(prefLayer);
const barsLayer   = el('g'); svg.appendChild(barsLayer);
const bubbleLayer = el('g'); svg.appendChild(bubbleLayer);

// ── Pan / Zoom ───────────────────────────────────────────────
let transform = { x: 0, y: 0, k: 1 };
let drag = null;

function applyTransform() {
  const t = `translate(${transform.x},${transform.y}) scale(${transform.k})`;
  prefLayer.setAttribute('transform', t);
  barsLayer.setAttribute('transform', t);
  bubbleLayer.setAttribute('transform', t);
}

svg.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  drag = { sx: e.clientX - transform.x, sy: e.clientY - transform.y };
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  transform.x = e.clientX - drag.sx;
  transform.y = e.clientY - drag.sy;
  applyTransform();
});
window.addEventListener('mouseup', () => drag = null);

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const svgScale = rect.width / designWidth;
  const mx = (e.clientX - rect.left) / svgScale;
  const my = (e.clientY - rect.top)  / svgScale;
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  transform.x = mx + (transform.x - mx) * factor;
  transform.y = my + (transform.y - my) * factor;
  transform.k *= factor;
  applyTransform();
}, { passive: false });

// Touch zoom
let touches = [];
svg.addEventListener('touchstart', e => { touches = [...e.touches]; }, { passive: true });
svg.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touches.length === 1) {
    transform.x += e.touches[0].clientX - touches[0].clientX;
    transform.y += e.touches[0].clientY - touches[0].clientY;
    applyTransform();
  } else if (e.touches.length === 2 && touches.length === 2) {
    const d0 = Math.hypot(touches[0].clientX-touches[1].clientX, touches[0].clientY-touches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = svg.getBoundingClientRect();
    const svgScale = rect.width / designWidth;
    const mx = (cx - rect.left) / svgScale;
    const my = (cy - rect.top)  / svgScale;
    const factor = d1 / d0;
    transform.x = mx + (transform.x - mx) * factor;
    transform.y = my + (transform.y - my) * factor;
    transform.k *= factor;
    applyTransform();
  }
  touches = [...e.touches];
}, { passive: false });

// ── Tooltip ──────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let stickyId = null;

function showTooltip(d, rank, total, e) {
  const diff    = ((d.spending - nationalAvg) / nationalAvg * 100).toFixed(1);
  const diffStr = diff > 0 ? `+${diff}%` : `${diff}%`;
  const pct     = (d.spending / 21695 * 100).toFixed(0);
  tooltip.innerHTML = `
    <div class="tt-name">${d.city}</div>
    <div class="tt-name-ja">${d.city_ja} · ${d.prefecture_ja}</div>
    <div class="tt-rank">Rank <span class="num">#${rank}</span> <span class="of">/ ${total}</span></div>
    <div class="tt-row">
      <span class="tt-label">Annual spending</span>
      <span class="tt-val">¥${d.spending.toLocaleString()}<span class="unit">JPY</span></span>
    </div>
    <div class="tt-row">
      <span class="tt-label"></span>
      <span class="tt-val" style="font-size:13px;color:#888">$${(d.spending*jpyToUsd).toFixed(0)}<span class="unit">USD</span></span>
    </div>
    <div class="tt-bar-bg"><div class="tt-bar-fill" style="width:${pct}%"></div></div>
    <div class="tt-row" style="margin-top:8px">
      <span class="tt-label">vs national avg</span>
      <span class="tt-val" style="font-size:13px;color:${diff>0?'#d03025':'#2a7a3b'}">${diffStr}</span>
    </div>
    <div class="tt-note">National avg ¥${nationalAvg.toLocaleString()} · 2023–2025 avg</div>
  `;
  positionTooltip(e);
  tooltip.classList.add('visible');
}

function positionTooltip(e) {
  const tw = 270, th = 200;
  let left = e.clientX + 16, top = e.clientY - 20;
  if (left + tw > window.innerWidth - 260) left = e.clientX - tw - 16;
  if (top + th > window.innerHeight - 20) top = window.innerHeight - th - 20;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ── Highlight linking ────────────────────────────────────────
const barById     = new Map();
const bubbleById  = new Map();
const rankItemById = new Map();

function clearHighlight() {
  document.body.classList.remove('highlighting');
  barById.forEach(g => g.classList.remove('linked'));
  bubbleById.forEach(g => g.classList.remove('linked'));
  rankItemById.forEach(i => i.classList.remove('linked'));
  stickyId = null;
}

function setHighlight(id) {
  clearHighlight();
  if (!id) return;
  document.body.classList.add('highlighting');
  barById.get(id)?.classList.add('linked');
  bubbleById.get(id)?.classList.add('linked');
  rankItemById.get(id)?.classList.add('linked');
  stickyId = id;
}

svg.addEventListener('click', e => {
  if (!e.target.closest('.bar-group') && !e.target.closest('.bubble-group')) clearHighlight();
});

// ── GeoJSON rendering ────────────────────────────────────────
function coordsToPath(coords) {
  return coords.map((ring, ri) =>
    ring.map(([lon, lat], i) => {
      const [x, y] = project(lon, lat);
      return (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
    }).join(' ') + ' Z'
  ).join(' ');
}

function renderGeoJSON(geojson) {
  prefLayer.innerHTML = '';
  for (const feature of geojson.features) {
    const geom = feature.geometry;
    let d = '';
    if (geom.type === 'Polygon') {
      d = coordsToPath(geom.coordinates);
    } else if (geom.type === 'MultiPolygon') {
      d = geom.coordinates.map(coordsToPath).join(' ');
    }
    if (!d) continue;
    const path = el('path', { d, class: 'pref-path' });
    prefLayer.appendChild(path);
  }
}

// ── CSV parser ───────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim());
    obj.spending = parseInt(obj.spending);
    obj.lon = parseFloat(obj.lon);
    obj.lat = parseFloat(obj.lat);
    return obj;
  });
}

// ── Bar chart ────────────────────────────────────────────────
const BAR_MAX_H = 90;
const BAR_W     = 6;
const BAR_COLOR = '#d03025';

function buildScaleLegend(maxSpending) {
  const legend = document.getElementById('scale-legend');
  legend.innerHTML = '';
  [0.33, 0.55, 0.75, 1.0].forEach(f => {
    const b = document.createElement('div');
    b.className = 'bar-sample';
    b.style.height = (f * 28) + 'px';
    legend.appendChild(b);
  });
}

function renderBars(cities) {
  barsLayer.innerHTML = '';
  const maxSpending = Math.max(...cities.map(d => d.spending));

  cities.forEach((d, i) => {
    const [cx, cy] = project(d.lon, d.lat);
    const barH = (d.spending / maxSpending) * BAR_MAX_H;
    const rank = i + 1;

    const grp = el('g', { class: 'bar-group' });
    grp.dataset.id = d.id;

    // shadow
    const shadow = el('ellipse', {
      cx, cy: cy + 2, rx: BAR_W * 0.9, ry: 2,
      fill: 'rgba(0,0,0,0.10)'
    });
    grp.appendChild(shadow);

    // main bar
    const bar = el('rect', {
      x: cx - BAR_W/2, y: cy - barH,
      width: BAR_W, height: barH,
      fill: BAR_COLOR, rx: 1.5,
      class: 'main-bar',
      opacity: 0.85
    });
    grp.appendChild(bar);

    // cap
    const cap = el('rect', {
      x: cx - BAR_W/2, y: cy - barH - 2,
      width: BAR_W, height: 3,
      fill: '#ff6b60', rx: 1,
      class: 'bar-cap'
    });
    grp.appendChild(cap);

    // hit area
    const hit = el('rect', {
      x: cx - 10, y: cy - barH - 10,
      width: 20, height: barH + 14,
      fill: 'transparent'
    });
    grp.appendChild(hit);

    grp.addEventListener('mouseenter', e => {
      if (!stickyId) showTooltip(d, rank, cities.length, e);
    });
    grp.addEventListener('mousemove', e => {
      if (!stickyId || stickyId === d.id) positionTooltip(e);
    });
    grp.addEventListener('mouseleave', () => { if (!stickyId) hideTooltip(); });
    grp.addEventListener('click', e => {
      e.stopPropagation();
      if (stickyId === d.id) { clearHighlight(); hideTooltip(); }
      else { setHighlight(d.id); showTooltip(d, rank, cities.length, e); }
    });

    barsLayer.appendChild(grp);
    barById.set(d.id, grp);
  });
}

// ── Bubble chart ─────────────────────────────────────────────
const BUBBLE_MAX_R = 28;
const BUBBLE_MIN_R = 5;

function spendingToColor(spending, max) {
  const t = spending / max;
  // red spectrum: low=pale, high=deep red
  const r = Math.round(255 - t * 40);
  const g = Math.round(220 - t * 190);
  const b = Math.round(210 - t * 200);
  return `rgb(${r},${g},${b})`;
}

function renderBubbles(cities) {
  bubbleLayer.innerHTML = '';
  const maxSpending = Math.max(...cities.map(d => d.spending));

  cities.forEach((d, i) => {
    const [cx, cy] = project(d.lon, d.lat);
    const r    = BUBBLE_MIN_R + (d.spending / maxSpending) * (BUBBLE_MAX_R - BUBBLE_MIN_R);
    const rank = i + 1;
    const color = spendingToColor(d.spending, maxSpending);

    const grp = el('g', { class: 'bubble-group' });
    grp.dataset.id = d.id;

    const circle = el('circle', {
      cx, cy, r,
      fill: color,
      stroke: '#fff',
      'stroke-width': 1.2,
      class: 'bubble-circle'
    });
    grp.appendChild(circle);

    grp.addEventListener('mouseenter', e => {
      if (!stickyId) showTooltip(d, rank, cities.length, e);
    });
    grp.addEventListener('mousemove', e => {
      if (!stickyId || stickyId === d.id) positionTooltip(e);
    });
    grp.addEventListener('mouseleave', () => { if (!stickyId) hideTooltip(); });
    grp.addEventListener('click', e => {
      e.stopPropagation();
      if (stickyId === d.id) { clearHighlight(); hideTooltip(); }
      else { setHighlight(d.id); showTooltip(d, rank, cities.length, e); }
    });

    bubbleLayer.appendChild(grp);
    bubbleById.set(d.id, grp);
  });
}

// ── Ranking sidebar ──────────────────────────────────────────
function buildRanking(cities) {
  const list = document.getElementById('rk-list');
  list.innerHTML = '';
  const max = cities[0].spending;

  cities.forEach((d, i) => {
    const rank = i + 1;
    const item = document.createElement('div');
    item.className = 'rk-item';
    item.dataset.id = d.id;

    const numClass = rank === 1 ? 'rk-num gold' : rank === 2 ? 'rk-num silver' : rank === 3 ? 'rk-num bronze' : 'rk-num';
    const pct = (d.spending / max * 100).toFixed(0);

    item.innerHTML = `
      <span class="${numClass}">${rank}</span>
      <span class="rk-name">${d.city_ja}</span>
      <div class="rk-bar"><div class="rk-bar-fill" style="width:${pct}%"></div></div>
      <span class="rk-val">¥${(d.spending/1000).toFixed(1)}k</span>
    `;

    item.addEventListener('mouseenter', e => {
      if (!stickyId) {
        setHighlight(d.id);
        showTooltip(d, rank, cities.length, { clientX: window.innerWidth - 270, clientY: e.clientY });
      }
    });
    item.addEventListener('mouseleave', () => {
      if (!stickyId) { clearHighlight(); hideTooltip(); }
    });
    item.addEventListener('click', () => {
      if (stickyId === d.id) { clearHighlight(); hideTooltip(); }
      else setHighlight(d.id);
    });

    list.appendChild(item);
    rankItemById.set(d.id, item);
  });
}

// ── View switching ───────────────────────────────────────────
let currentView = 'bar';

function setView(mode) {
  currentView = mode;
  document.getElementById('btn-bar').classList.toggle('active', mode === 'bar');
  document.getElementById('btn-bubble').classList.toggle('active', mode === 'bubble');

  if (mode === 'bar') {
    barsLayer.style.display = '';
    bubbleLayer.style.display = 'none';
    document.getElementById('scale-legend').style.display = '';
    document.getElementById('scale-label').textContent = 'Bar height = annual spending (JPY)';
  } else {
    barsLayer.style.display = 'none';
    bubbleLayer.style.display = '';
    document.getElementById('scale-legend').style.display = 'none';
    document.getElementById('scale-label').textContent = 'Bubble size = annual spending (JPY)';
  }
  clearHighlight();
  hideTooltip();
}

// ── Main: load data ──────────────────────────────────────────
async function main() {
  try {
    const [geoRes, csvRes] = await Promise.all([
      fetch(GEOJSON_URL),
      fetch(CSV_URL)
    ]);

    if (!geoRes.ok) throw new Error('GeoJSON fetch failed: ' + geoRes.status);
    if (!csvRes.ok) throw new Error('CSV fetch failed: ' + csvRes.status);

    const [geojson, csvText] = await Promise.all([
      geoRes.json(),
      csvRes.text()
    ]);

    const cities = parseCSV(csvText).sort((a, b) => b.spending - a.spending);

    renderGeoJSON(geojson);
    renderBars(cities);
    renderBubbles(cities);
    buildRanking(cities);
    buildScaleLegend(cities[0].spending);

    // start in bar mode
    bubbleLayer.style.display = 'none';

    document.getElementById('loading').style.display = 'none';

  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#d03025;font-size:15px;">⚠️ 読み込みエラー</div>
      <div style="font-size:12px;color:#999;margin-top:8px;">${err.message}</div>
      <div style="font-size:11px;color:#bbb;margin-top:4px;">ローカルサーバー経由でアクセスしてください</div>
    `;
  }
}

main();
</script>
