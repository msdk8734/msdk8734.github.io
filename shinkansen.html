<style>
#viz { font-family: var(--font-sans); }
@keyframes dash { to { stroke-dashoffset: -20; } }
.line-anim { stroke-dasharray: 5 3; animation: dash 1.2s linear infinite; }
</style>

<div id="viz" style="padding:1rem 0;">

<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
  <div>
    <div id="year-display" style="font-size:52px;font-weight:500;color:var(--color-text-primary);line-height:1;">1960</div>
    <div id="era-label" style="font-size:13px;color:var(--color-text-secondary);margin-top:2px;">Before the Shinkansen</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
    <div style="display:flex;gap:6px;">
      <button id="btn-play" onclick="togglePlay()" style="font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary);">▶ Play</button>
      <button onclick="resetAnim()" style="font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary);">↺ Reset</button>
    </div>
    <div style="font-size:11px;color:var(--color-text-tertiary);">Auto-plays through history</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Lines open</div>
    <div id="stat-lines" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">0</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Top speed (km/h)</div>
    <div id="stat-speed" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">—</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Avg. delay</div>
    <div id="stat-delay" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">—</div>
  </div>
</div>

<div style="position:relative;width:100%;">
  <svg id="map-svg" width="100%" viewBox="0 0 520 600" style="display:block;">
    <g id="prefectures"></g>
    <g id="lines-group"></g>
    <g id="stations-group"></g>
  </svg>
</div>

<div id="legend" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:11px;color:var(--color-text-secondary);"></div>

<div style="margin-top:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;">
  <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">Max speed history (km/h)</div>
  <div style="position:relative;height:56px;"><canvas id="speed-canvas"></canvas></div>
</div>

<div id="event-log" style="margin-top:8px;font-size:12px;color:var(--color-text-secondary);min-height:18px;font-style:italic;padding:0 2px;"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let GEOJSON = null;

// Shinkansen lines: stations as [lon, lat] (real coordinates)
const LINES = [
  {
    id:'tokaido', name:'Tokaido', color:'#2563EB', openYear:1964,
    coords:[[135.50,34.70],[135.73,35.02],[136.88,35.17],[137.74,34.97],[138.39,35.00],[139.62,35.45],[139.70,35.68]],
    stations:[['Shin-Osaka',135.50,34.70],['Kyoto',135.73,35.02],['Nagoya',136.88,35.17],['Shizuoka',138.39,35.00],['Yokohama',139.62,35.45],['Tokyo',139.70,35.68]],
  },
  {
    id:'sanyo', name:'Sanyo', color:'#DC2626', openYear:1975,
    coords:[[130.42,33.59],[130.87,33.84],[132.46,34.39],[133.92,34.66],[134.60,34.84],[135.50,34.70]],
    stations:[['Hakata',130.42,33.59],['Hiroshima',132.46,34.39],['Okayama',133.92,34.66],['Shin-Osaka',135.50,34.70]],
  },
  {
    id:'tohoku', name:'Tohoku', color:'#16A34A', openYear:1982,
    coords:[[139.70,35.68],[139.62,36.10],[140.36,36.55],[140.86,37.73],[141.13,38.26],[141.14,39.70],[140.77,40.82],[141.17,41.29],[140.88,40.82]],
    stations:[['Tokyo',139.70,35.68],['Omiya',139.62,36.10],['Sendai',140.86,37.73],['Morioka',141.13,39.70],['Shin-Aomori',140.77,40.82]],
    openExt:{year:1985,coords:[[139.70,35.68],[139.62,36.10]]},
  },
  {
    id:'joetsu', name:'Joetsu', color:'#9333EA', openYear:1982,
    coords:[[139.70,35.68],[139.62,36.10],[138.95,37.17],[138.94,37.91],[139.02,37.92]],
    stations:[['Tokyo',139.70,35.68],['Niigata',139.02,37.92]],
  },
  {
    id:'hokuriku', name:'Hokuriku', color:'#EA580C', openYear:1997,
    coords:[[139.70,35.68],[139.62,36.10],[138.24,36.65],[136.62,36.58],[136.63,36.59]],
    stations:[['Tokyo',139.70,35.68],['Nagano',138.24,36.65],['Kanazawa',136.62,36.58]],
    ext2024:[[136.63,36.59],[136.22,36.14],[135.84,35.91],[135.59,35.92]],
  },
  {
    id:'kyushu', name:'Kyushu', color:'#0891B2', openYear:2004,
    coords:[[130.42,33.59],[130.50,33.00],[130.70,32.80],[130.74,31.56]],
    stations:[['Hakata',130.42,33.59],['Kumamoto',130.70,32.80],['Kagoshima-Chuo',130.74,31.56]],
    openFull:2011,
  },
  {
    id:'hokkaido', name:'Hokkaido', color:'#7C3AED', openYear:2016,
    coords:[[140.77,40.82],[141.40,41.73],[140.73,41.90],[141.68,42.77]],
    stations:[['Shin-Aomori',140.77,40.82],['Shin-Hakodate',141.40,41.73]],
  },
  {
    id:'nishikyushu', name:'Nishi-Kyushu', color:'#0D9488', openYear:2022,
    coords:[[130.01,33.27],[129.87,32.74]],
    stations:[['Takeo-Onsen',130.01,33.27],['Nagasaki',129.87,32.74]],
  },
];

const SPEED_HISTORY = [
  {year:1964,speed:210,event:'Tokaido Shinkansen opens — world's first high-speed rail at 210 km/h'},
  {year:1972,speed:210,event:'Sanyo line reaches Okayama'},
  {year:1975,speed:210,event:'Sanyo line extended to Hakata (Fukuoka)'},
  {year:1982,speed:240,event:'Tohoku & Joetsu lines open; speed raised to 240 km/h'},
  {year:1992,speed:270,event:'Nozomi service launches — 270 km/h on Tokaido'},
  {year:1997,speed:300,event:'Hokuriku opens; Tokaido achieves 300 km/h'},
  {year:2004,speed:300,event:'Kyushu Shinkansen opens (partial)'},
  {year:2007,speed:300,event:'N700 series debut — avg delay under 1 min achieved'},
  {year:2011,speed:320,event:'E5 series: 320 km/h on Tohoku. Kyushu Shinkansen fully opens'},
  {year:2015,speed:320,event:'Hokuriku extended to Kanazawa'},
  {year:2016,speed:320,event:'Hokkaido Shinkansen opens to Shin-Hakodate'},
  {year:2022,speed:320,event:'Nishi-Kyushu Shinkansen opens (Takeo-Onsen to Nagasaki)'},
  {year:2024,speed:320,event:'Hokuriku extended to Tsuruga; N700S trials at 360 km/h begin'},
];

const DELAY_DATA = {
  1964:'~1.5 min',1975:'~1.2 min',1982:'~1.0 min',1992:'~0.8 min',
  2007:'~0.6 min',2019:'0.2 min',2023:'1.6 min',2024:'1.6 min'
};

const ERA_LABELS = {
  1960:'Before the Shinkansen',1964:'The Shinkansen Era Begins',
  1972:'Westward Expansion',1975:'Reaching Kyushu',
  1982:'The Network Grows North',1992:'Speed Revolution',
  1997:'Into the Mountains',2004:'Island Bridges',
  2011:'320 km/h Achieved',2016:'Crossing to Hokkaido',
  2022:'Nishi-Kyushu Opens',2024:'Toward 360 km/h',
};

// ── Map setup ─────────────────────────────────────────────────────────────────
const svg = d3.select('#map-svg');
const width = 520, height = 600;

const projection = d3.geoMercator()
  .center([137.5, 37.0])
  .scale(1000)
  .translate([width/2, height/2]);

const pathGen = d3.geoPath().projection(projection);
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
const prefFill = isDark ? '#2a2a2a' : '#e8e6df';
const prefStroke = isDark ? '#444' : '#b8b5aa';

// Load prefectures from GitHub
fetch('https://msdk8734.github.io/geo-json/japan-simplified.geojson')
  .then(r => r.json())
  .then(data => {
    GEOJSON = data;
    svg.select('#prefectures')
      .selectAll('path')
      .data(GEOJSON.features)
      .join('path')
      .attr('d', pathGen)
      .attr('fill', prefFill)
      .attr('stroke', prefStroke)
      .attr('stroke-width', '0.4');
  })
  .catch(() => {
    svg.select('#prefectures').append('text')
      .attr('x', 260).attr('y', 300).attr('text-anchor', 'middle')
      .attr('fill', 'var(--color-text-tertiary)').attr('font-size', '13')
      .text('Map data could not be loaded.');
  });

// ── Chart ──────────────────────────────────────────────────────────────────────
let speedChart;
function initChart() {
  const ctx = document.getElementById('speed-canvas');
  speedChart = new Chart(ctx, {
    type:'line',
    data:{
      labels: SPEED_HISTORY.map(h=>h.year),
      datasets:[
        {data:SPEED_HISTORY.map(h=>h.speed),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.08)',borderWidth:1.5,pointRadius:2,fill:true,tension:0.3},
        {data:SPEED_HISTORY.map(()=>null),borderColor:'#DC2626',borderWidth:0,pointRadius:6,pointBackgroundColor:'#DC2626',showLine:false},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false,min:160,max:380}},
      animation:{duration:150},
    }
  });
}

// ── State ──────────────────────────────────────────────────────────────────────
let currentYear = 1960, playing = false, timer = null;

function render(year) {
  currentYear = year;
  document.getElementById('year-display').textContent = year;

  // Era label
  let era = ERA_LABELS[1960];
  for (const y of Object.keys(ERA_LABELS).map(Number).sort((a,b)=>a-b))
    if (year >= y) era = ERA_LABELS[y];
  document.getElementById('era-label').textContent = era;

  // Speed
  let speed = 0, sidx = 0;
  for (let i=0;i<SPEED_HISTORY.length;i++) {
    if (SPEED_HISTORY[i].year <= year) { speed = SPEED_HISTORY[i].speed; sidx = i; }
  }
  document.getElementById('stat-speed').textContent = speed || '—';

  // Delay
  let delay = '—';
  for (const y of Object.keys(DELAY_DATA).map(Number).sort((a,b)=>a-b))
    if (year >= y) delay = DELAY_DATA[y];
  document.getElementById('stat-delay').textContent = delay;

  // Open lines
  const openLines = LINES.filter(l => l.openYear <= year);
  document.getElementById('stat-lines').textContent = openLines.length;

  // Draw lines
  const linesG = svg.select('#lines-group');
  linesG.selectAll('*').remove();

  for (const line of openLines) {
    const pts = line.coords.map(c => projection(c));
    const lineStr = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');

    // glow
    linesG.append('path').attr('d',lineStr).attr('fill','none')
      .attr('stroke',line.color).attr('stroke-width','6').attr('opacity','0.15')
      .attr('stroke-linecap','round').attr('stroke-linejoin','round');
    // main
    linesG.append('path').attr('d',lineStr).attr('fill','none')
      .attr('stroke',line.color).attr('stroke-width','2.5').attr('opacity','0.9')
      .attr('stroke-linecap','round').attr('stroke-linejoin','round');

    // Hokuriku 2024 extension
    if (line.id==='hokuriku' && year>=2024 && line.ext2024) {
      const ext = line.ext2024.map(c=>projection(c));
      const extStr = 'M'+pts[pts.length-1].map(v=>v.toFixed(1)).join(' ')+' '+ext.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
      linesG.append('path').attr('d',extStr).attr('fill','none')
        .attr('stroke',line.color).attr('stroke-width','2.5').attr('opacity','0.9')
        .attr('stroke-linecap','round').attr('stroke-linejoin','round');
    }
  }

  // Draw stations
  const stationsG = svg.select('#stations-group');
  stationsG.selectAll('*').remove();
  const drawn = new Set();
  const majorLabels = new Set(['Tokyo','Shin-Osaka','Hakata','Nagoya','Sendai','Shin-Aomori','Shin-Hakodate','Kagoshima-Chuo','Kanazawa','Niigata']);

  for (const line of openLines) {
    for (const [name, lon, lat] of line.stations) {
      if (drawn.has(name)) continue;
      drawn.add(name);
      const [px, py] = projection([lon, lat]);
      // outer
      stationsG.append('circle').attr('cx',px).attr('cy',py).attr('r',4)
        .attr('fill','white').attr('stroke',line.color).attr('stroke-width','1.5');
      // label for major stations
      if (majorLabels.has(name)) {
        const anchor = lon < 136 ? 'end' : 'start';
        const dx = lon < 136 ? -7 : 7;
        stationsG.append('text')
          .attr('x', px+dx).attr('y', py+4)
          .attr('text-anchor', anchor)
          .attr('font-size','8').attr('fill', isDark ? '#aaa' : '#555')
          .attr('font-family','var(--font-sans)')
          .text(name);
      }
    }
  }

  // Legend
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  for (const line of openLines) {
    legend.innerHTML += `<span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:16px;height:3px;background:${line.color};border-radius:2px;"></span>${line.name} (${line.openYear})</span>`;
  }

  // Event log
  const ev = SPEED_HISTORY.find(h=>h.year===year);
  document.getElementById('event-log').textContent = ev ? ev.event : '';

  // Chart
  if (speedChart) {
    speedChart.data.datasets[1].data = SPEED_HISTORY.map((h,i)=>i===sidx ? h.speed : null);
    speedChart.update('none');
  }
}

function togglePlay() {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) tick();
  else clearTimeout(timer);
}

function tick() {
  if (!playing) return;
  if (currentYear >= 2025) { playing=false; document.getElementById('btn-play').textContent='▶ Play'; return; }
  render(currentYear+1);
  const hasEvent = SPEED_HISTORY.some(h=>h.year===(currentYear));
  timer = setTimeout(tick, hasEvent ? 1800 : 300);
}

function resetAnim() {
  playing=false; clearTimeout(timer);
  document.getElementById('btn-play').textContent='▶ Play';
  render(1960);
}

initChart();
render(1960);
setTimeout(()=>{ playing=true; document.getElementById('btn-play').textContent='⏸ Pause'; tick(); }, 800);
</script>
